name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Format check
        run: test -z "$(gofmt -l .)"

      - name: Test
        run: go test ./...

      - name: npm package smoke test
        run: npm pack --dry-run

